<title>Portal Educativo Interactivo – Roger Herrera</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f7f2;
    --surface: #ffffff;
    --surface2: #eef2eb;
    --border: #d4dece;
    --text: #1a2417;
    --text2: #4a5e44;
    --text3: #7a9272;
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-dark: #0F6E56;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --coral: #993C1D;
    --coral-light: #FAECE7;
    --radius: 12px;
    --radius-sm: 8px;
  }
  body { font-family: 'Georgia', serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  nav {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 58px;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
  }
  .nav-brand { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 700; color: var(--green-dark); }
  .nav-brand span { font-size: 22px; }
  .nav-links { display: flex; gap: 6px; }
  .nav-links button {
    font-family: 'Trebuchet MS', sans-serif;
    font-size: 13px; color: var(--text2);
    background: none; border: none;
    padding: 7px 16px; border-radius: 20px;
    cursor: pointer; transition: background 0.15s, color 0.15s;
  }
  .nav-links button:hover { background: var(--surface2); }
  .nav-links button.active { background: var(--green); color: white; font-weight: 600; }

  }
  .hero-overlay {
    position: fixed; inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.08) 0%, rgba(10,50,30,0.45) 100%);
    z-index: 1; transition: opacity 0.4s;
  }
  .hero-title {
    position: fixed; bottom: 2.5rem; left: 0; right: 0;
    text-align: center; z-index: 2; color: white;
    pointer-events: none; transition: opacity 0.4s;
  }
  .hero-title h1 {
    font-size: 2.4rem; font-weight: 700; letter-spacing: -0.02em;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5); margin-bottom: 0.3rem;
  }
  .hero-title p {
    font-size: 1rem; font-family: 'Trebuchet MS', sans-serif;
    opacity: 0.9; text-shadow: 0 1px 6px rgba(0,0,0,0.5);
  }

  .content-panel {
    display: none; position: relative; z-index: 10;
    margin-top: 58px; min-height: calc(100vh - 58px);
    background: var(--bg); padding: 2rem 1.5rem;
  }
  .content-panel.visible { display: block; }
  body.panel-open .hero,
  body.panel-open .hero-overlay,
  body.panel-open .hero-title { opacity: 0; pointer-events: none; }

  .panel-inner { max-width: 1000px; margin: 0 auto; }
  .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .panel-header h2 { font-size: 20px; font-weight: 700; color: var(--text); }
  .btn-back {
    font-family: 'Trebuchet MS', sans-serif; font-size: 13px;
    color: var(--text2); background: var(--surface);
    border: 1px solid var(--border); padding: 6px 14px;
    border-radius: 20px; cursor: pointer; transition: background 0.15s;
  }
  .btn-back:hover { background: var(--surface2); }

  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 14px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.2rem 1.4rem;
    transition: box-shadow 0.15s, transform 0.15s;
    display: flex; flex-direction: column; gap: 0.5rem;
  }
  .card:hover { box-shadow: 0 4px 20px rgba(29,158,117,0.12); transform: translateY(-2px); }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .card-type {
    font-size: 11px; font-weight: 700; padding: 3px 9px;
    border-radius: 6px; font-family: 'Trebuchet MS', sans-serif;
    text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap;
  }
  .type-interactivo { background: var(--green-light); color: var(--green-dark); }
  .type-texto { background: var(--blue-light); color: var(--blue); }
  .type-video { background: var(--coral-light); color: var(--coral); }
  .card-icon { font-size: 22px; }
  .card h3 { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.35; }
  .card p { font-size: 13px; color: var(--text2); line-height: 1.55; font-family: 'Trebuchet MS', sans-serif; flex: 1; }
  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 0.5rem; padding-top: 0.75rem; border-top: 1px solid var(--border);
  }
  .card-meta { font-size: 12px; color: var(--text3); font-family: 'Trebuchet MS', sans-serif; }
  .card-link {
    font-size: 13px; color: white; background: var(--green);
    font-family: 'Trebuchet MS', sans-serif; font-weight: 600;
    text-decoration: none; padding: 5px 12px; border-radius: 20px;
    transition: background 0.15s;
  }
  .card-link:hover { background: var(--green-dark); }
  .empty-state {
    grid-column: 1/-1; text-align: center; padding: 3rem;
    color: var(--text3); font-size: 15px;
    font-family: 'Trebuchet MS', sans-serif;
    border: 1px dashed var(--border); border-radius: var(--radius);
  }

  footer {
    text-align: center; padding: 2rem; font-size: 13px;
    color: var(--text3); font-family: 'Trebuchet MS', sans-serif;
    border-top: 1px solid var(--border); margin-top: 3rem;
  }

  @media (max-width: 600px) {
    .hero-title h1 { font-size: 1.6rem; }
    nav { padding: 0 1rem; }
    .nav-links button { padding: 6px 10px; font-size: 12px; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-brand"><span>🌿</span> Portal Educativo</div>
  <div class="nav-links">
    <button onclick="setTab('todos', this)">Todos</button>
    <button onclick="setTab('interactivo', this)">Interactivos</button>
    <button onclick="setTab('texto', this)">Textos</button>
    <button onclick="setTab('video', this)">Videos</button>
  </div>
</nav>

<div class="hero"></div>
<div class="hero-overlay"></div>
<div class="hero-title">
  <h1>Portal Educativo Interactivo</h1>
  <p>Prof. Roger Herrera &middot; Biología y Ciencias Naturales</p>
</div>

<div class="content-panel" id="content-panel">
  <div class="panel-inner">
    <div class="panel-header">
      <h2 id="panel-title">Todos los materiales</h2>
      <button class="btn-back" onclick="goHome()">← Volver</button>
    </div>
    <div class="cards-grid" id="cards-container"></div>
  </div>
  <footer>Portal Educativo Interactivo · Prof. Roger Herrera · Bolivia · 2025</footer>
</div>

<script>
  const ICONS = { interactivo: '⚡', texto: '📄', video: '🎬' };
  const TITLES = {
    todos: 'Todos los materiales',
    interactivo: 'Materiales interactivos',
    texto: 'Textos y lecturas',
    video: 'Videos'
  };

  const materials = [
    { tipo:'interactivo', titulo:'Serpientes y Escaleras del Sistema Articular', desc:'Juego de mesa interactivo para aprender el sistema articular del cuerpo humano.', tema:'Sistema Articular', fecha:'2025', url:'https://claude.ai/public/artifacts/9f273f08-00a6-41b1-9233-e423fbdfd134' },
    { tipo:'interactivo', titulo:'Los Sentidos', desc:'Actividad interactiva de gamificación sobre los órganos de los sentidos.', tema:'Fisiología', fecha:'2025', url:'https://claude.ai/public/artifacts/4440b1cb-3fae-4c03-bb21-5250941ffeda' },
    { tipo:'interactivo', titulo:'Crisis Metabólica Celular', desc:'Juego interactivo sobre metabolismo celular y sus procesos energéticos.', tema:'Metabolismo', fecha:'2025', url:'https://claude.ai/public/artifacts/0afbe18c-f3b9-4b29-a520-a528d1ff1ee9' },
    { tipo:'interactivo', titulo:'Biomoléculas', desc:'Actividad gamificada para identificar y clasificar las biomoléculas esenciales.', tema:'Bioquímica', fecha:'2025', url:'https://claude.ai/public/artifacts/74ffb5b5-7dbc-43f7-8bc7-80d4a2842b27' },
    { tipo:'interactivo', titulo:'Genética Puzzle - Cuadros de Punnett', desc:'Puzzle interactivo para practicar cruces genéticos y cuadros de Punnett.', tema:'Genética', fecha:'2025', url:'https://claude.ai/public/artifacts/d3dad4cd-2277-4de8-865b-5d641975019a' },
    { tipo:'interactivo', titulo:'Cadena de Contagio - Virus de la Rabia', desc:'Simulación interactiva sobre la cadena epidemiológica del virus de la rabia.', tema:'Epidemiología', fecha:'2025', url:'https://claude.ai/public/artifacts/d0460f96-1949-4c29-876d-79aa4c371904' },
    { tipo:'interactivo', titulo:'La Carrera de la Energía', desc:'Juego de carrera interactivo sobre producción y uso de energía celular.', tema:'Metabolismo', fecha:'2025', url:'https://claude.ai/public/artifacts/43ce4856-a2f9-4f0f-b858-d9610f73ad0b' },
    { tipo:'interactivo', titulo:'Sentidos (versión 2)', desc:'Segunda versión mejorada de la actividad interactiva sobre los sentidos.', tema:'Fisiología', fecha:'2025', url:'https://claude.ai/public/artifacts/affc4c9b-fe61-49b4-aef4-74de10fcee2f' },
    { tipo:'interactivo', titulo:'Calculadora de Enfermedades No Transmisibles', desc:'Herramienta interactiva para calcular riesgos de enfermedades no transmisibles.', tema:'Salud Pública', fecha:'2025', url:'https://claude.ai/public/artifacts/faa2d3e6-a0a3-40da-9a17-e477ea429995' },
  ];

  let currentTab = 'todos';

  function renderCards(list) {
    const c = document.getElementById('cards-container');
    if (!list.length) { c.innerHTML = '<div class="empty-state">No hay materiales en esta sección aún.</div>'; return; }
    c.innerHTML = list.map(m => `
      <div class="card">
        <div class="card-header">
          <span class="card-type type-${m.tipo}">${m.tipo.charAt(0).toUpperCase()+m.tipo.slice(1)}</span>
          <span class="card-icon">${ICONS[m.tipo]}</span>
        </div>
        <h3>${m.titulo}</h3>
        <p>${m.desc}</p>
        <div class="card-footer">
          <span class="card-meta">${m.tema} &middot; ${m.fecha}</span>
          ${m.url ? `<a class="card-link" href="${m.url}" target="_blank">Abrir →</a>` : ''}
        </div>
      </div>`).join('');
  }

  function setTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active'));
    if (el) el.classList.add('active');
    document.getElementById('panel-title').textContent = TITLES[tab];
    const filtered = materials.filter(m => tab === 'todos' || m.tipo === tab);
    renderCards(filtered);
    document.getElementById('content-panel').classList.add('visible');
    document.body.classList.add('panel-open');
    window.scrollTo(0, 0);
  }

  function goHome() {
    document.getElementById('content-panel').classList.remove('visible');
    document.body.classList.remove('panel-open');
    document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active'));
  }
</script>
</body>
</html>
